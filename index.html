<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <h1 class="game-title">Water Drop</h1>
        <p class="game-tagline">Catch the good drops, avoid the bad ones!</p>

        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">30</span>s</div>
            <button id="start-btn">Start Game</button>
        </div>

        <label for="difficulty-modes" class="sr-only">Choose a difficulty:</label>

        <select id="difficulty-modes">
          <option value="">Select a difficulty</option>
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
        
        <div id="game-container">
          <img id="cw-logo" src="img/cw_logo-horizontal.png" alt="A yellow jerry can with the text charity: water to the right of it">
          
          <div id="end-screen" class="hidden">
            <h2 id="game-message"></h2>
          </div>
        </div>
    </div>

    <footer>
      <a href="https://www.charitywater.org/">charity:water website</a>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
